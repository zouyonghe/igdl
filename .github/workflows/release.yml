name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_name_suffix: macos-aarch64.tar.gz
            binary_name: igdl
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_name_suffix: macos-x86_64.tar.gz
            binary_name: igdl
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name_suffix: linux-x86_64.tar.gz
            binary_name: igdl
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name_suffix: windows-x86_64.zip
            binary_name: igdl.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        env:
          ARCHIVE_NAME: igdl-${{ github.ref_name }}-${{ matrix.archive_name_suffix }}
          ARCHIVE_SUFFIX: ${{ matrix.archive_name_suffix }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "package/${{ matrix.binary_name }}"
          python3 - <<'PY'
          import os
          import pathlib
          import tarfile
          import zipfile

          archive_name = os.environ["ARCHIVE_NAME"]
          archive_suffix = os.environ["ARCHIVE_SUFFIX"]
          binary_name = os.environ["BINARY_NAME"]

          binary_path = pathlib.Path("package") / binary_name
          archive_path = pathlib.Path("dist") / archive_name

          if archive_suffix.endswith(".zip"):
              with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  archive.write(binary_path, arcname=binary_name)
          else:
              with tarfile.open(archive_path, "w:gz") as archive:
                  archive.add(binary_path, arcname=binary_name)
          PY

      - name: Upload packaged binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.target }}-archive
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
