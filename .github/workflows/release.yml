name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_suffix: macos-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package archive
        run: |
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/igdl" package/igdl
          tar -czf "dist/igdl-${GITHUB_REF_NAME}-${{ matrix.archive_suffix }}.tar.gz" -C package igdl

      - name: Upload packaged binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.target }}-archive
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
